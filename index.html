<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SysMoBench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hub/hub.css?v=15" />
<link rel="stylesheet" href="phases/tokens.css?v=15" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#4f8cff",
      "dark": false
    }/*EDITMODE-END*/;
  </script>

  <script src="data.js?v=15"></script>
  <script type="text/babel" src="hub/anim.jsx?v=15"></script>
  <script type="text/babel" src="hub/lb.jsx?v=15"></script>
  <script type="text/babel" src="phases/style-a-academic.jsx?v=15"></script>
  <script type="text/babel" src="hub/pages.jsx?v=15"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    function Nav({ route, go, tweaks, update }) {
      const links = [
        { id: "home", label: "Home" },
        { id: "leaderboard", label: "Leaderboard" },
        { id: "systems", label: "Systems & Metrics" },
        { id: "cite", label: "Cite & Contribute" }
      ];
      return (
        <div className="nav">
          <div className="nav-inner">
            <div className="nav-brand" onClick={() => go("home")}>
              <Mark size={26} />
              <span className="nav-brand-name">SysMoBench</span>
            </div>
            <div className="nav-links">
              {links.map(l => (
                <a key={l.id} className={"nav-link" + (route === l.id ? " active" : "")} onClick={() => go(l.id)}>{l.label}</a>
              ))}
              <button
                className="theme-toggle"
                title={tweaks.dark ? "Switch to light" : "Switch to dark"}
                onClick={() => update({ dark: !tweaks.dark })}
              >
                {tweaks.dark ? "☀" : "☾"}
              </button>
              <a className="nav-cta" href="https://github.com/specula-org/SysMoBench" target="_blank" style={{marginLeft:8}}>
                GitHub
              </a>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [route, go] = useHashRoute("home");
      const [tweaks, setTweaks] = useState(() => {
        // 1. user's explicit choice (persisted in localStorage) wins
        try {
          const saved = localStorage.getItem("smb_tweaks");
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        // 2. otherwise fall back to system preference
        const prefersDark =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        return { ...window.TWEAK_DEFAULTS, dark: prefersDark };
      });
      const [open, setOpen] = useState(false);

      useEffect(() => {
        const r = document.documentElement;
        r.style.setProperty("--accent", tweaks.accent);
        r.setAttribute("data-theme", tweaks.dark ? "dark" : "light");
      }, [tweaks]);

      // Follow OS theme changes *unless* the user has set their own preference
      useEffect(() => {
        const mq = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
        if (!mq) return;
        const onChange = (e) => {
          if (localStorage.getItem("smb_tweaks")) return; // user override → don't auto-flip
          setTweaks(t => ({ ...t, dark: e.matches }));
        };
        mq.addEventListener ? mq.addEventListener("change", onChange) : mq.addListener(onChange);
        return () => {
          mq.removeEventListener ? mq.removeEventListener("change", onChange) : mq.removeListener(onChange);
        };
      }, []);

      useEffect(() => {
        const onMsg = (e) => {
          const d = e.data;
          if (!d || typeof d !== "object") return;
          if (d.type === "__activate_edit_mode") setOpen(true);
          if (d.type === "__deactivate_edit_mode") setOpen(false);
        };
        window.addEventListener("message", onMsg);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", onMsg);
      }, []);

      const update = (patch) => {
        setTweaks(t => {
          const next = { ...t, ...patch };
          try { localStorage.setItem("smb_tweaks", JSON.stringify(next)); } catch (e) {}
          return next;
        });
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
      };

      const ACCENTS = { "#4f8cff": "periwinkle", "#1e88e5": "bright blue", "#0ea5e9": "cyan", "#2f6690": "steel", "#d97757": "terracotta" };

      let Page;
      if (route === "leaderboard") Page = <PageLeaderboard />;
      else if (route === "systems") Page = <PageSystems />;
      else if (route === "cite") Page = <PageCite />;
      else Page = <PageHome go={go} />;

      return (
        <div data-screen-label={route}>
          <Nav route={route} go={go} tweaks={tweaks} update={update} />
          <main>{Page}</main>
          <footer className="site-foot">
            <div className="wrap">
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Mark size={22} />
                <span>SysMoBench · <a href="https://github.com/specula-org" target="_blank">specula-org</a></span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:18}}>
                <a href="https://arxiv.org/abs/2509.23130" target="_blank">Paper</a>
                <a href="https://github.com/specula-org/SysMoBench" target="_blank">GitHub</a>
                <a onClick={() => go("cite")} style={{cursor:"pointer"}}>Cite</a>
                <span className="foot-sep" aria-hidden="true" />
                <span>Released under Apache 2.0</span>
              </div>
            </div>
          </footer>

          <div className={"tweaks" + (open ? " open" : "")}>
            <h4>Tweaks</h4>
            <div className="row">
              <label>Accent</label>
              <div className="swatches">
                {Object.keys(ACCENTS).map(hex => (
                  <button key={hex} title={ACCENTS[hex]} className={"sw" + (tweaks.accent === hex ? " active" : "")} style={{background:hex}} onClick={() => update({accent:hex})} />
                ))}
              </div>
            </div>
            <div className="row">
              <label>Theme</label>
              <div style={{display:"flex",gap:6}}>
                <button className={"btn" + (!tweaks.dark ? " primary" : "")} style={{flex:1,justifyContent:"center",fontSize:12,padding:"6px 10px"}} onClick={() => update({dark:false})}>Light</button>
                <button className={"btn" + (tweaks.dark ? " primary" : "")} style={{flex:1,justifyContent:"center",fontSize:12,padding:"6px 10px"}} onClick={() => update({dark:true})}>Dark</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
